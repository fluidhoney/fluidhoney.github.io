<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fluidhoney - Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 30px;
            background: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-height: 60px;
        }

        .link-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background: #f0f0f0;
        }

        .link-button:active {
            transform: translateY(-1px);
        }

        .link-button.twitter {
            border-left: 5px solid #1DA1F2;
        }

        .link-button.twitter:hover {
            background: #f0f8ff;
        }

        .link-button.twitter-alt {
            border-left: 5px solid #1DA1F2;
        }

        .link-button.twitter-alt:hover {
            background: #f0f8ff;
        }

        .link-button.discord {
            border-left: 5px solid #5865F2;
        }

        .link-button.discord:hover {
            background: #f0f3ff;
        }

        .link-button.pinterest {
            border-left: 5px solid #E60023;
        }

        .link-button.pinterest:hover {
            background: #fff0f0;
        }

        .link-button.youtube {
            border-left: 5px solid #FF0000;
        }

        .link-button.youtube:hover {
            background: #fff0f0;
        }

        .icon {
            margin-right: 12px;
            font-size: 1.3em;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .music-player {
            width: 100%;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }

        .music-player h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
            text-align: center;
        }

        .player-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .player-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
            font-size: 0.9em;
        }

        .player-button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .player-button:active {
            transform: translateY(0);
        }

        .player-button.small {
            flex: 0.5;
            padding: 10px 10px;
        }

        .song-dropdown {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 1em;
            background: white;
            color: #333;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .song-dropdown:hover {
            border-color: #764ba2;
        }

        .song-dropdown:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(118, 75, 162, 0.3);
        }

        .progress-container {
            width: 100%;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            font-size: 0.85em;
            color: #666;
            text-align: center;
        }

        .now-playing {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.95em;
            min-height: 20px;
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.9em;
        }

        .error-message.show {
            display: block;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2em;
            }

            .link-button {
                padding: 15px 25px;
                font-size: 1em;
                min-height: 55px;
            }

            .music-player {
                padding: 15px;
            }

            .player-controls {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>fluidhoney</h1>
        </div>

        <div class="buttons-container">
            <a href="https://x.com/fluid_honey" target="_blank" class="link-button twitter">
                <span class="icon"><img src="twitter.svg" alt="Twitter"></span>
                <span>twitter main</span>
            </a>

            <a href="https://x.com/foidhon" target="_blank" class="link-button twitter-alt">
                <span class="icon"><img src="twitter.svg" alt="Twitter"></span>
                <span>twitter alt</span>
            </a>

            <a href="https://discord.com/users/1194802881732292690" target="_blank" class="link-button discord">
                <span class="icon"><img src="discord.svg" alt="Discord"></span>
                <span>discord</span>
            </a>

            <a href="https://pinterest.com/fluid_honey" target="_blank" class="link-button pinterest">
                <span class="icon"><img src="pinterest.svg" alt="Pinterest"></span>
                <span>pinterest</span>
            </a>

            <a href="https://youtube.com/@fluid_honey" target="_blank" class="link-button youtube">
                <span class="icon"><img src="youtube.svg" alt="YouTube"></span>
                <span>youtube</span>
            </a>
        </div>

        <div class="music-player">
            <h3>🎵 Music Player</h3>
            
            <div class="error-message" id="errorMessage"></div>

            <select id="songDropdown" class="song-dropdown">
                <option value="">Select a song...</option>
                <option value="0">Ночь</option>
                <option value="1">Про дурачка</option>
                <option value="2">Шла война</option>
                <option value="3">Лето и арбалеты</option>
                <option value="4">Qad Tasama</option>
            </select>

            <div class="now-playing" id="nowPlaying"></div>

            <div class="player-controls">
                <button class="player-button small" id="prevBtn">⏮️</button>
                <button class="player-button" id="playBtn">▶️ Play</button>
                <button class="player-button" id="pauseBtn">⏸️ Pause</button>
                <button class="player-button small" id="nextBtn">⏭️</button>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
            </div>

            <audio id="audioPlayer" crossorigin="anonymous"></audio>
        </div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const songDropdown = document.getElementById('songDropdown');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const nowPlaying = document.getElementById('nowPlaying');
        const errorMessage = document.getElementById('errorMessage');

        const songs = [
            { title: 'Ночь', filename: 'Ночь.mp3' },
            { title: 'Про дурачка', filename: 'Про дурачка.mp3' },
            { title: 'Шла война', filename: 'Шла война.mp3' },
            { title: 'Лето и арбалеты', filename: 'Лето и арбалеты.mp3' },
            { title: 'Qad Tasama', filename: 'Qad Tasama.mp3' }
        ];

        let currentSongIndex = -1;

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('show');
            console.error('Player Error:', msg);
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        songDropdown.addEventListener('change', (e) => {
            const selectedIndex = parseInt(e.target.value);
            if (selectedIndex >= 0 && selectedIndex < songs.length) {
                currentSongIndex = selectedIndex;
                loadSong(currentSongIndex);
                audioPlayer.play().catch(err => {
                    showError('Failed to play: ' + err.message);
                });
                updatePlayButton();
            }
        });

        playBtn.addEventListener('click', () => {
            if (currentSongIndex >= 0) {
                audioPlayer.play().catch(err => {
                    showError('Failed to play: ' + err.message);
                });
                updatePlayButton();
            } else {
                showError('Please select a song first');
            }
        });

        pauseBtn.addEventListener('click', () => {
            audioPlayer.pause();
            updatePlayButton();
        });

        prevBtn.addEventListener('click', () => {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            audioPlayer.play().catch(err => {
                showError('Failed to play: ' + err.message);
            });
            updatePlayButton();
        });

        nextBtn.addEventListener('click', () => {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            audioPlayer.play().catch(err => {
                showError('Failed to play: ' + err.message);
            });
            updatePlayButton();
        });

        audioPlayer.addEventListener('ended', () => {
            nextBtn.click();
        });

        audioPlayer.addEventListener('timeupdate', updateProgress);

        audioPlayer.addEventListener('error', () => {
            if (audioPlayer.error) {
                let errorMsg = 'Error loading audio';
                if (audioPlayer.error.code === audioPlayer.error.MEDIA_ERR_ABORTED) {
                    errorMsg = 'Audio loading was aborted';
                } else if (audioPlayer.error.code === audioPlayer.error.MEDIA_ERR_NETWORK) {
                    errorMsg = 'Network error while loading audio';
                } else if (audioPlayer.error.code === audioPlayer.error.MEDIA_ERR_DECODE) {
                    errorMsg = 'Audio file could not be decoded';
                } else if (audioPlayer.error.code === audioPlayer.error.MEDIA_ERR_SRC_NOT_SUPPORTED) {
                    errorMsg = 'Audio file format not supported or file not found';
                }
                showError(errorMsg);
            }
        });

        progressBar.addEventListener('click', (e) => {
            if (audioPlayer.duration) {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audioPlayer.currentTime = percent * audioPlayer.duration;
            }
        });

        function loadSong(index) {
            if (index >= 0 && index < songs.length) {
                const song = songs[index];
                audioPlayer.src = song.filename;
                nowPlaying.textContent = 'Now Playing: ' + song.title;
                songDropdown.value = index;
                console.log('Loading:', song.filename);
            }
        }

        function updateProgress() {
            if (audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressFill.style.width = percent + '%';
                
                const currentMinutes = Math.floor(audioPlayer.currentTime / 60);
                const currentSeconds = Math.floor(audioPlayer.currentTime % 60);
                const durationMinutes = Math.floor(audioPlayer.duration / 60);
                const durationSeconds = Math.floor(audioPlayer.duration % 60);
                
                timeDisplay.textContent = `${currentMinutes}:${String(currentSeconds).padStart(2, '0')} / ${durationMinutes}:${String(durationSeconds).padStart(2, '0')}`;
            }
        }

        function updatePlayButton() {
            if (audioPlayer.paused) {
                playBtn.style.background = '#667eea';
                pauseBtn.style.background = '#ccc';
            } else {
                playBtn.style.background = '#ccc';
                pauseBtn.style.background = '#764ba2';
            }
        }

        updatePlayButton();
    </script>
</body>
</html>
