<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fluidhoney</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: -2;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header-title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header-pfp {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .header-content {
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-pfp-large {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .bio-box {
            background-color: #111184;
            color: white;
            padding: 15px;
            border-radius: 8px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
            text-align: left;
            font-size: 0.9em;
            line-height: 1.5;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .bio-box:hover {
            opacity: 1;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            color: white;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-height: 60px;
            opacity: 0.7;
        }

        .link-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            opacity: 1;
        }

        .link-button:active {
            transform: translateY(-1px);
        }

        .link-button.twitter {
            background-color: #2daae1;
        }

        .link-button.discord {
            background-color: #7289d9;
        }

        .link-button.youtube {
            background-color: #ff0000;
        }

        .link-button.pinterest {
            background-color: #cf0b0f;
        }

        .icon {
            margin-right: 12px;
            font-size: 1.3em;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .music-player {
            width: 100%;
            background-color: #111184;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .music-player:hover {
            opacity: 1;
        }

        .player-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .player-button {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .player-button:hover {
            transform: scale(1.1);
        }

        .player-button:active {
            transform: scale(0.95);
        }

        .player-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .progress-container {
            width: 100%;
            margin-top: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #6a0985;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            font-size: 0.85em;
            color: white;
            text-align: center;
            margin-top: 8px;
            font-weight: 600;
        }

        .song-dropdown {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 600;
            background: #6a0985;
            color: white;
            cursor: pointer;
            margin-bottom: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .song-dropdown:hover {
            background: #6a0985;
        }

        .song-dropdown:focus {
            outline: none;
            background: #6a0985;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .now-playing {
            text-align: center;
            color: white;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.95em;
            min-height: 20px;
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.9em;
        }

        .error-message.show {
            display: block;
        }

        audio {
            display: none;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2em;
            }

            .header-content {
                flex-direction: column;
                align-items: center;
            }

            .header-pfp-large {
                width: 80px;
                height: 80px;
            }

            .bio-box {
                width: 100%;
                font-size: 0.85em;
                padding: 12px;
            }

            .link-button {
                padding: 15px 25px;
                font-size: 1em;
                min-height: 55px;
            }

            .player-button {
                width: 28px;
                height: 28px;
            }
        }
    </style>
</head>
<body>
    <video class="video-background" autoplay muted loop>
        <source src="wallpaper.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="header">
            <h1>fluidhoney</h1>
            <div class="header-content">
                <div class="header-left">
                    <img src="pfp.webp" alt="Profile Picture" class="header-pfp-large">
                </div>
                <div class="bio-box">im very lesbian, very transsexual, and very marxist. i think code geass is a great show, cs_office is the best cs map, and chopin is the greatest musician of all time.</div>
            </div>
        </div>

        <div class="buttons-container">
            <a href="https://x.com/fluid_honey" target="_blank" class="link-button twitter">
                <span class="icon"><img src="twitter.svg" alt="Twitter"></span>
                <span>twitter main</span>
            </a>

            <a href="https://x.com/foidhon" target="_blank" class="link-button twitter">
                <span class="icon"><img src="twitter.svg" alt="Twitter"></span>
                <span>twitter alt</span>
            </a>

            <a href="https://discord.com/users/1194802881732292690" target="_blank" class="link-button discord">
                <span class="icon"><img src="discord.png" alt="Discord"></span>
                <span>discord</span>
            </a>

            <a href="https://youtube.com/@fluid_honey" target="_blank" class="link-button youtube">
                <span class="icon"><img src="youtube.svg" alt="YouTube"></span>
                <span>youtube</span>
            </a>

            <a href="https://pinterest.com/fluid_honey" target="_blank" class="link-button pinterest">
                <span class="icon"><img src="pinterest.png" alt="Pinterest"></span>
                <span>pinterest</span>
            </a>
        </div>

        <div class="music-player">
            <div class="error-message" id="errorMessage"></div>

            <select id="songDropdown" class="song-dropdown">
                <option value="0">Ночь</option>
                <option value="1">Про дурачка</option>
                <option value="2">Шла война</option>
                <option value="3">Лето и арбалеты</option>
                <option value="4">Qad Tasama</option>
            </select>

            <div class="now-playing" id="nowPlaying"></div>

            <div class="player-controls">
                <button class="player-button" id="prevBtn" title="Previous Song">
                    <img src="previous.png" alt="Previous">
                </button>
                <button class="player-button" id="playPauseBtn" title="Play/Pause">
                    <img src="play.png" alt="Play">
                </button>
                <button class="player-button" id="nextBtn" title="Next Song">
                    <img src="next.png" alt="Next">
                </button>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
            </div>

            <audio id="audioPlayer" crossorigin="anonymous"></audio>
        </div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const songDropdown = document.getElementById('songDropdown');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const nowPlaying = document.getElementById('nowPlaying');
        const errorMessage = document.getElementById('errorMessage');

        const songs = [
            { title: 'Ночь', filename: 'Ночь.mp3' },
            { title: 'Про дурачка', filename: 'Про дурачка.mp3' },
            { title: 'Шла война', filename: 'Шла война.mp3' },
            { title: 'Лето и арбалеты', filename: 'Лето и арбалеты.mp3' },
            { title: 'Qad Tasama', filename: 'Qad Tasama.mp3' }
        ];

        let currentSongIndex = -1;

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('show');
            console.error('Player Error:', msg);
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        songDropdown.addEventListener('change', (e) => {
            const selectedIndex = parseInt(e.target.value);
            if (selectedIndex >= 0 && selectedIndex < songs.length) {
                currentSongIndex = selectedIndex;
                loadSong(currentSongIndex);
                audioPlayer.play().catch(err => {
                    showError('Failed to play: ' + err.message);
                });
                updatePlayPauseButton();
            }
        });

        playPauseBtn.addEventListener('click', () => {
            if (currentSongIndex >= 0) {
                if (audioPlayer.paused) {
                    audioPlayer.play().catch(err => {
                        showError('Failed to play: ' + err.message);
                    });
                } else {
                    audioPlayer.pause();
                }
                updatePlayPauseButton();
            }
        });

        prevBtn.addEventListener('click', () => {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            audioPlayer.play().catch(err => {
                showError('Failed to play: ' + err.message);
            });
            updatePlayPauseButton();
        });

        nextBtn.addEventListener('click', () => {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            audioPlayer.play().catch(err => {
                showError('Failed to play: ' + err.message);
            });
            updatePlayPauseButton();
        });

        audioPlayer.addEventListener('ended', () => {
            nextBtn.click();
        });

        audioPlayer.addEventListener('timeupdate', updateProgress);

        audioPlayer.addEventListener('error', () => {
            if (audioPlayer.error) {
                let errorMsg = 'Error loading audio';
                if (audioPlayer.error.code === audioPlayer.error.MEDIA_ERR_ABORTED) {
                    errorMsg = 'Audio loading was aborted';
                } else if (audioPlayer.error.code === audioPlayer.error.MEDIA_ERR_NETWORK) {
                    errorMsg = 'Network error while loading audio';
                } else if (audioPlayer.error.code === audioPlayer.error.MEDIA_ERR_DECODE) {
                    errorMsg = 'Audio file could not be decoded';
                } else if (audioPlayer.error.code === audioPlayer.error.MEDIA_ERR_SRC_NOT_SUPPORTED) {
                    errorMsg = 'Audio file format not supported or file not found';
                }
                showError(errorMsg);
            }
        });

        progressBar.addEventListener('click', (e) => {
            if (audioPlayer.duration) {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audioPlayer.currentTime = percent * audioPlayer.duration;
            }
        });

        function loadSong(index) {
            if (index >= 0 && index < songs.length) {
                const song = songs[index];
                audioPlayer.src = song.filename;
                nowPlaying.textContent = song.title;
                songDropdown.value = index;
                console.log('Loading:', song.filename);
            }
        }

        function updateProgress() {
            if (audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressFill.style.width = percent + '%';
                
                const currentMinutes = Math.floor(audioPlayer.currentTime / 60);
                const currentSeconds = Math.floor(audioPlayer.currentTime % 60);
                const durationMinutes = Math.floor(audioPlayer.duration / 60);
                const durationSeconds = Math.floor(audioPlayer.duration % 60);
                
                timeDisplay.textContent = `${currentMinutes}:${String(currentSeconds).padStart(2, '0')} / ${durationMinutes}:${String(durationSeconds).padStart(2, '0')}`;
            }
        }

        function updatePlayPauseButton() {
            if (audioPlayer.paused) {
                playPauseBtn.querySelector('img').src = 'play.png';
                playPauseBtn.title = 'Play';
            } else {
                playPauseBtn.querySelector('img').src = 'pause.png';
                playPauseBtn.title = 'Pause';
            }
        }

        // Select Ночь by default on page load
        window.addEventListener('load', () => {
            currentSongIndex = 0;
            loadSong(0);
            updatePlayPauseButton();
        });

        updatePlayPauseButton();
    </script>
</body>
</html>
